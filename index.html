<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dalil Tounes - Le guide digital des établissements et services en Tunisie." />
    
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#D4AF37" />

    <link
      rel="preload"
      as="image"
      href="/images/drapeau-tunisie.webp?v=1"
      fetchpriority="high"
      type="image/webp"
    />

    <style>
      /* Reset minimal */
      *,::before,::after{box-sizing:border-box;border-width:0;border-style:solid}
      html{line-height:1.5;-webkit-text-size-adjust:100%;font-family:ui-sans-serif,system-ui,sans-serif}
      body{margin:0;overflow-x:hidden;background:#fff}
      
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
      .sk{animation:pulse 1.8s ease-in-out infinite;background:#e5e7eb;border-radius:.75rem}

      /* Navbar placeholder */
      #pre-nav{height:56px;background:#fff;border-bottom:1px solid #f0e6d2;display:flex;align-items:center;padding:0 1rem;position:sticky;top:0;z-index:50}
      
      /* Hero placeholder OPTIMISÉ */
      #pre-hero{padding:1rem}
      #pre-hero-inner{
        max-width:72rem;margin:0 auto;border-radius:1.5rem;overflow:hidden;
        position:relative;min-height:200px; /* Augmenté pour correspondre au visuel final */
        background:#1a0a18;display:flex;align-items:center;justify-content:center;
      }
      /* L'astuce est ici : on affiche l'image direct dans le skeleton */
      #pre-hero-img {
        position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
        opacity:0.6; /* Pour laisser voir le texte au-dessus */
      }
      .hero-content-sk{position:relative;z-index:2;width:100%;display:flex;flex-direction:column;align-items:center;gap:10px}
      .h1-sk{width:250px;height:24px;background:rgba(255,255,255,0.2)}

      #pre-search{padding:0 1rem}
      .input-sk{max-width:72rem;margin:0 auto;height:48px;border-radius:.75rem;background:#f3f4f6}
    </style>
  </head>
  <body>
    <div id="pre-skeleton">
      <div id="pre-nav">
        <div class="sk" style="width:120px;height:28px"></div>
      </div>
      
      <div id="pre-hero">
        <div id="pre-hero-inner">
          <img 
            src="/images/drapeau-tunisie.webp?v=1" 
            id="pre-hero-img"
            alt="Drapeau Tunisie"
            fetchpriority="high"
          >
          <div class="hero-content-sk">
            <div class="sk h1-sk"></div>
            <div class="sk" style="width:180px;height:16px;background:rgba(255,255,255,0.1)"></div>
          </div>
        </div>
      </div>

      <div id="pre-search">
        <div class="sk input-sk"></div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      (function(){
        var ob = new MutationObserver(function(){
          var r = document.getElementById('root');
          if(r && r.children.length > 0){
            var sk = document.getElementById('pre-skeleton');
            if(sk) sk.remove();
            ob.disconnect();
          }
        });
        ob.observe(document.getElementById('root'), {childList:true});
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
