<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dalil Tounes - Le guide digital des établissements et services en Tunisie. Trouvez facilement entreprises, services et opportunités." />
    <meta name="keywords" content="Tunisie, annuaire, entreprises, services, commerce, emploi, éducation, santé" />

    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#D4AF37" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dalil Tounes" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192x192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png" />

    <meta property="og:site_name" content="Dalil Tounes" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_TN" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@daliltounes" />

    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="https://kmvjegbtroksjqaqliyv.supabase.co" />
    <link rel="dns-prefetch" href="https://images.pexels.com" />
    <link rel="dns-prefetch" href="https://ik.imagekit.io" />
    <link rel="preconnect" href="https://kmvjegbtroksjqaqliyv.supabase.co" crossorigin />
    <link rel="preconnect" href="https://ik.imagekit.io" crossorigin />
    <!-- Preload Playfair Display — desktop uniquement (media query évite le téléchargement mobile) -->
    <link rel="preload" href="/fonts/playfair-display-400-latin.woff2" as="font" type="font/woff2" crossorigin media="(min-width: 769px)" />
    <link rel="preload" href="/fonts/playfair-display-700-latin.woff2" as="font" type="font/woff2" crossorigin media="(min-width: 769px)" />
    <!-- Preload LCP hero image -->
    <link
      rel="preload"
      as="image"
      href="https://kmvjegbtroksjqaqliyv.supabase.co/storage/v1/object/public/photos-dalil/drapeau-tunisie.webp?v=1"
      fetchpriority="high"
    />
    <!-- Canonical and OG defaults (overridden per-page by SEOHead) -->
    <link rel="canonical" href="https://dalil-tounes.com/" />
    <meta property="og:url" content="https://dalil-tounes.com/" />
    <meta property="og:title" content="Dalil Tounes - Guide digital des établissements en Tunisie" />
    <meta property="og:description" content="Trouvez facilement entreprises, services, emplois et événements en Tunisie." />
    <meta name="robots" content="index, follow" />
    <title>Dalil Tounes - Guide digital des établissements en Tunisie</title>

    <!-- CSS critique inline — débloque le rendu immédiatement sans attendre le bundle Vite -->
    <style>
      /* Reset minimal */
      *,::before,::after{box-sizing:border-box;border-width:0;border-style:solid}
      html{line-height:1.5;-webkit-text-size-adjust:100%;font-family:ui-sans-serif,system-ui,sans-serif}
      body{margin:0;line-height:inherit;overflow-x:hidden}
      #root{min-height:100vh}

      /* Layout above-the-fold */
      .max-w-6xl{max-width:72rem;width:100%}
      .mx-auto{margin-left:auto;margin-right:auto}
      .px-4{padding-left:1rem;padding-right:1rem}
      .py-4{padding-top:1rem;padding-bottom:1rem}
      .relative{position:relative}
      .absolute{position:absolute}
      .inset-0{top:0;right:0;bottom:0;left:0}
      .overflow-hidden{overflow:hidden}
      .rounded-3xl{border-radius:1.5rem}
      .w-full{width:100%}
      .h-full{height:100%}
      .object-cover{object-fit:cover}
      .text-center{text-align:center}
      .text-white{color:#fff}
      .z-10{z-index:10}
      .flex{display:flex}
      .items-center{align-items:center}
      .justify-center{justify-content:center}
      .gap-4{gap:1rem}
      .flex-wrap{flex-wrap:wrap}

      /* Hero image — évite le layout shift */
      .hero-img{
        position:absolute;inset:0;
        width:100%;height:100%;
        object-fit:cover;
        filter:brightness(1.05);
      }
      .hero-overlay{
        position:absolute;inset:0;
        background:rgba(0,0,0,.30);
      }

      /* Skeleton placeholders — visibles dès le 1er paint */
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
      .skeleton{
        border-radius:1rem;
        background:#f3f4f6;
        animation:pulse 2s cubic-bezier(.4,0,.6,1) infinite;
      }

      /* Navigation bar placeholder */
      .nav-placeholder{
        height:56px;
        background:#fff;
        border-bottom:1px solid #f0e6d2;
      }

      /* Police mobile — pas de téléchargement web font */
      @media(max-width:768px){
        h1,h2,h3,h4,h5,h6{font-family:Georgia,'Times New Roman',Times,serif}
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
