    <!--
      Skeleton HTML natif — visible dès le premier octet, avant que React charge.
      Élimine la page blanche et donne au navigateur un "LCP candidate" immédiat.

    <div id="pre-skeleton">

      </div>
    </div>

    <div id="root"></div>

    <script>
      // Supprime le skeleton dès que React a monté son premier composant
      (function(){
        var ob = new MutationObserver(function(){
          var r = document.getElementById('root');
          if(r && r.children.length > 0){
            var sk = document.getElementById('pre-skeleton');
            if(sk) sk.remove();
            ob.disconnect();
          }
        });
        ob.observe(document.getElementById('root'), {childList:true});
      })();
    </script>
